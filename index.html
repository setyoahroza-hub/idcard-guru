<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Teacher Card</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">

            <img src="logo/logo.png" class="logo">

            <h1>YAYASAN</h1>
            <h2>CITRA HARAPAN JAYA</h2>

        </div>

        <div class="profile">

            <img id="foto" class="foto" src="">

            <h2 id="nama"></h2>

            <h3 id="jabatan"></h3>

        </div>

        <div class="section-title">
            Biodata Guru
        </div>

        <div class="item">
            <span>👤 Nama</span>
            <strong id="nama2"></strong>
        </div>

        <div class="item">
            <span>🚹 Jenis Kelamin</span>
            <strong id="jk"></strong>
        </div>

        <div class="item">
            <span>🪪 NIK</span>
            <strong id="nik"></strong>
        </div>

        <div class="item">
            <span>📍 Tempat Lahir</span>
            <strong id="tempat"></strong>
        </div>

        <div class="item">
            <span>🎂 Tanggal Lahir</span>
            <strong id="lahir"></strong>
        </div>

        <div class="item">
            <span>🆔 NUPTK</span>
            <strong id="nuptk"></strong>
        </div>

        <div class="item">
            <span>🏫 Unit Kerja</span>
            <strong id="unit"></strong>
        </div>

        <div class="footer">

            Digital Teacher Card

            <br>

            © Yayasan Citra Harapan Jaya

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
