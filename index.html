<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Guru</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <img id="foto" src="" alt="Foto Guru">

    <h2 id="nama">Nama Guru</h2>

    <table>

        <tr>
            <td>Jenis Kelamin</td>
            <td id="jk"></td>
        </tr>

        <tr>
            <td>NIK</td>
            <td id="nik"></td>
        </tr>

        <tr>
            <td>Tempat Lahir</td>
            <td id="tempat"></td>
        </tr>

        <tr>
            <td>Tanggal Lahir</td>
            <td id="lahir"></td>
        </tr>

        <tr>
            <td>NUPTK</td>
            <td id="nuptk"></td>
        </tr>

        <tr>
            <td>Unit Kerja</td>
            <td id="unit"></td>
        </tr>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
